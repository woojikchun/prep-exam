  {cat:'arch',freq:5,title:'파이프라인 — 구조·해저드 종류·해결 기법',years:['98','02','06','11','16','21'],recent:['16','21'],variants:['명령어 파이프라인의 5단계(IF·ID·EX·MEM·WB)와 처리량 향상 원리를 설명하시오','파이프라인 해저드(Data·Structural·Control)의 발생 원인과 해결 방법을 비교하시오','슈퍼스칼라(Superscalar)와 VLIW 아키텍처를 파이프라인 관점에서 비교하시오'],tip:'<strong>5단계 파이프라인 다이어그램 그릴 수 있어야 함.</strong> 데이터 해저드(포워딩), 제어 해저드(분기 예측), 구조적 해저드(스톨) 각각 해결책까지 서술.'},
  {cat:'arch',freq:5,title:'가상 메모리 — 페이징·세그멘테이션·페이지 교체',years:['97','01','05','10','15','20'],recent:['15','20'],variants:['가상 메모리의 필요성과 페이징·세그멘테이션을 비교하시오','페이지 교체 알고리즘(OPT·LRU·FIFO·Clock)을 비교하고 Belady 이상을 설명하시오','스래싱(Thrashing) 발생 원인과 워킹셋(Working Set) 모델로 해결하는 방법을 서술하시오','역페이지 테이블(Inverted Page Table)의 구조와 TLB 역할을 설명하시오'],tip:'<strong>스래싱+워킹셋 조합 빈출.</strong> 교체 알고리즘은 참조 문자열 예시로 페이지 폴트 횟수 직접 계산 문항 단골.'},
  {cat:'arch',freq:4,title:'DMA·채널 I/O — 입출력 방식 비교',years:['00','06','13','19'],recent:['13','19'],variants:['폴링·인터럽트 구동·DMA·채널 I/O 방식을 CPU 개입 정도 관점에서 비교하시오','DMA 컨트롤러의 동작 과정과 사이클 스틸링(Cycle Stealing)을 설명하시오'],tip:'표로 비교(CPU 개입, 속도, 복잡도)하고 DMA 동작 흐름도를 그리면 고득점.'},
  {cat:'arch',freq:5,title:'폰 노이만 vs. 뉴로모픽·양자 컴퓨팅 비교',years:['08','14','18','21','23'],recent:['21','23'],variants:['폰 노이만 아키텍처의 메모리 월(Memory Wall) 한계와 뉴로모픽 컴퓨팅의 해결 방안을 설명하시오','양자 컴퓨팅의 큐비트 원리와 기존 폰 노이만 방식과의 차이를 서술하시오','인메모리 컴퓨팅(PIM)과 뉴로모픽 칩(Loihi, TrueNorth)의 구조와 응용을 설명하시오'],tip:'<strong>최근 출제 급증 토픽.</strong> 뉴로모픽·양자 모두 폰 노이만과 비교 구조로 서술. SNN·LIF 모델, 큐비트·중첩·얽힘 개념 숙지.'},
  {cat:'os',freq:7,title:'교착상태 (Deadlock) — 조건·탐지·예방·회피·회복',years:['95','99','03','07','11','16','20','23'],recent:['20','23'],variants:['Coffman 4가지 교착상태 발생 조건을 설명하고 예방(Prevention) 방법을 논하시오','은행가 알고리즘(Banker\'s Algorithm)의 안전 상태 판별 과정을 예시와 함께 설명하시오','자원 할당 그래프(RAG)로 교착상태를 탐지하는 방법을 서술하시오','교착상태 예방·회피·탐지·회복을 비교하고 실제 OS에서의 채택 방식을 논하시오'],tip:'<strong>전통적 최빈출 1위.</strong> Coffman 4조건(상호배제·점유대기·비선점·환형대기) 암기 필수. 은행가 알고리즘은 Max-Allocation=Need 테이블 계산 연습.'},
  {cat:'os',freq:6,title:'CPU 스케줄링 알고리즘 비교',years:['96','00','04','09','14','19'],recent:['14','19'],variants:['SJF·SRTF·Round Robin·Priority 스케줄링을 평균 대기 시간 관점에서 비교하시오','선점(Preemptive) vs. 비선점(Non-preemptive) 스케줄링의 차이와 적합 환경을 서술하시오','기아(Starvation)와 에이징(Aging)을 설명하고 다단계 큐(MLQ·MLFQ)를 논하시오','실시간 운영체제의 EDF·RM 스케줄링 알고리즘을 설명하시오'],tip:'간트 차트(Gantt Chart)를 직접 그려 대기 시간·반환 시간을 계산하는 문항 자주 출제. MLFQ 피드백 큐의 동작 원리까지 준비.'},
  {cat:'os',freq:5,title:'프로세스 동기화 — 임계구역·세마포·모니터',years:['97','02','07','12','17','22'],recent:['17','22'],variants:['임계구역 문제의 3가지 요건(상호배제·진행·한계대기)을 설명하시오','생산자-소비자(Bounded Buffer) 문제를 세마포로 해결하는 과정을 서술하시오','뮤텍스와 세마포의 차이, 모니터(Monitor)의 구조와 조건 변수를 설명하시오','식사하는 철학자 문제의 교착상태 발생 원인과 해결 방안을 논하시오'],tip:'세마포 P/V 연산 의사코드 작성 문항 자주 나옴. 생산자-소비자 세마포 3개(mutex·empty·full) 패턴은 반드시 암기.'},
  {cat:'db',freq:7,title:'정규화 — 1NF~BCNF 단계·이상(Anomaly)·반정규화',years:['95','99','03','07','11','15','20','23'],recent:['20','23'],variants:['함수 종속(FD) 개념을 기반으로 1NF~BCNF 정규화 단계를 예시 릴레이션과 함께 설명하시오','삽입·삭제·갱신 이상(Anomaly)의 발생 원인과 정규화로 해소하는 과정을 서술하시오','반정규화(Denormalization)의 필요성과 방법론(테이블 합병·분리·컬럼 중복)을 논하시오','이행 함수 종속(Transitive FD)을 제거하여 3NF로 분해하는 과정을 예시로 설명하시오'],tip:'<strong>DB 파트 최빈출 1위.</strong> 릴레이션을 주고 "몇 정규형인지, 어떻게 분해하는지" 직접 수행하는 유형 자주 출제. BCNF와 3NF의 차이("결정자가 후보키여야") 명확히.'},
  {cat:'db',freq:6,title:'트랜잭션 ACID·격리수준·동시성 제어',years:['97','01','05','10','14','19','22'],recent:['19','22'],variants:['ACID 특성을 설명하고 각 특성을 보장하는 DBMS 메커니즘(Lock·Undo·Redo)을 서술하시오','트랜잭션 격리 수준 4단계를 Dirty Read·Non-Repeatable Read·Phantom Read 관점에서 비교하시오','2PL(2단계 잠금 프로토콜)의 동작 원리와 교착상태 발생 가능성을 설명하시오','MVCC(다중 버전 동시성 제어)의 원리와 낙관적·비관적 동시성 제어를 비교하시오'],tip:'격리 수준 4×3 표(수준×이상현상 O/X)는 반드시 작성 가능하게 암기. 2PL과 MVCC 비교도 빈출.'},
  {cat:'db',freq:5,title:'인덱스 — B+ 트리·해시·클러스터드 vs. 논클러스터드',years:['98','04','09','15','21'],recent:['15','21'],variants:['B+ 트리 인덱스의 구조와 삽입·삭제 시 노드 분할·합병 과정을 설명하시오','클러스터드 인덱스와 논클러스터드 인덱스의 차이와 선택 기준을 서술하시오','해시 인덱스의 등치 검색 O(1) 원리와 범위 검색 불가 이유를 설명하시오'],tip:'B Tree와 B+ Tree의 차이(리프 노드 데이터 포인터, 리프 체인)를 그림으로 비교.'},
  {cat:'db',freq:5,title:'분산 데이터베이스 — 2PC·CAP 정리·NoSQL',years:['02','08','13','18','22'],recent:['18','22'],variants:['2단계 커밋(2PC) 프로토콜의 동작 과정과 코디네이터 장애 시 문제점을 설명하시오','CAP 정리(Consistency·Availability·Partition Tolerance)를 설명하고 NoSQL 분류를 논하시오','데이터베이스 샤딩(Sharding)과 복제(Replication) 방식을 비교하시오'],tip:'CAP 정리에서 CP(HBase), AP(Cassandra), CA(전통 RDBMS) 분류 예시로 암기.'},

const catLabel={all:'전체',arch:'컴퓨터구조',os:'운영체제',db:'데이터베이스',net:'네트워크',sec:'보안·암호',sw:'소프트웨어공학',ai:'AI·신기술'};
function freqClass(f){return f>=5?'freq-5':f===4?'freq-4':'freq-3'}
let cur='all';

function render(){
  const filtered=cur==='all'?DATA:DATA.filter(d=>d.cat===cur);
  const list=document.getElementById('list');
  if(!filtered.length){list.innerHTML='<div class="empty">해당 카테고리 토픽이 없습니다.</div>';return}
  const byCat={};
  filtered.forEach(d=>{if(!byCat[d.cat])byCat[d.cat]=[];byCat[d.cat].push(d)});
  let html='';
  for(const cat in byCat){
    if(cur==='all')html+=`<div class="section-divider">${catLabel[cat]}</div>`;
    byCat[cat].sort((a,b)=>b.freq-a.freq).forEach((d,i)=>{
      const id='tc'+cat+i;
      const ychips=d.years.map(y=>`<span class="yc${d.recent.includes(y)?' recent':''}">${y}회</span>`).join('');
      const vars=d.variants.map(v=>`<li>${v}</li>`).join('');
      html+=`<div class="topic-card">
        <div class="tc-head" onclick="tog('${id}')">
          <span class="tc-badge ${freqClass(d.freq)}">${d.freq}회 출제</span>
          <span class="tc-title">${d.title}</span>
          <span class="tc-cat">${catLabel[d.cat]}</span>
          <span class="tc-arrow" id="arr-${id}">▼</span>
        </div>
        <div class="tc-body" id="body-${id}">
          <div class="year-chips">${ychips}</div>
          <div class="variants" style="margin:.5rem 0"><ul>${vars}</ul></div>
          <div class="tip">💡 <strong>수험 전략</strong>: ${d.tip}</div>
        </div>
      </div>`;
    });
  }
  list.innerHTML=html;
}

function tog(id){
  const b=document.getElementById('body-'+id);
  const a=document.getElementById('arr-'+id);
  const o=b.classList.toggle('open');
  a.textContent=o?'▲':'▼';
}

document.getElementById('frow').addEventListener('click',e=>{
  const b=e.target.closest('.fb');
  if(!b)return;
  document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  cur=b.dataset.f;
  render();
});

document.getElementById('s5').textContent=DATA.filter(d=>d.freq>=5).length;
document.getElementById('s4').textContent=DATA.filter(d=>d.freq===4).length;
document.getElementById('s3').textContent=DATA.filter(d=>d.freq===3).length;
document.getElementById('stot').textContent=DATA.length;
render();
</script>
