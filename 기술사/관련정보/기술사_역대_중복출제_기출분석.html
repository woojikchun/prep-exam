const cats = [...new Set(DATA.map(d=>d.cat))];
let activeCats = new Set(cats);
let openGroups = new Set();

function heat2badge(h){
  if(h>=5) return '<span class="badge bd-r">초고빈출</span>';
  if(h>=4) return '<span class="badge bd-a">고빈출</span>';
  return '<span class="badge bd-b">빈출</span>';
}
function heat2cat(cat){
  const m={
    '운영체제':'bd-t','데이터베이스':'bd-b','네트워크':'bd-g',
    '보안':'bd-r','소프트웨어공학':'bd-p','컴퓨터구조':'bd-a',
    '알고리즘':'bd-c','신기술':'bd-b'
  };
  return m[cat]||'bd-b';
}

function render(){
  const kw = document.getElementById('search').value.trim().toLowerCase();
  const filtered = DATA.filter(g=>{
    if(!activeCats.has(g.cat)) return false;
    if(!kw) return true;
    return g.title.toLowerCase().includes(kw) ||
      g.tip.toLowerCase().includes(kw) ||
      g.items.some(i=>i.q.toLowerCase().includes(kw));
  });

  const hot = filtered.filter(g=>g.heat>=5).length;
  const totalQ = filtered.reduce((a,g)=>a+g.items.reduce((b,i)=>b+i.years.length,0),0);
  document.getElementById('s-total').textContent = filtered.length;
  document.getElementById('s-hot').textContent = hot;
  document.getElementById('s-q').textContent = totalQ;

  const listEl = document.getElementById('list');
  if(!filtered.length){
    listEl.innerHTML='<div class="empty">검색 결과가 없습니다.</div>';
    return;
  }
  listEl.innerHTML = filtered.map((g,idx)=>{
    const id='g'+idx;
    const isOpen = openGroups.has(g.title);
    const totalOccur = g.items.reduce((a,i)=>a+i.years.length,0);
    return `<div class="group">
      <div class="group-head" onclick="toggleGroup('${g.title}','${id}')">
        <div class="group-meta">
          <span class="badge ${heat2cat(g.cat)}">${g.cat}</span>
          ${heat2badge(g.heat)}
        </div>
        <div class="group-title">${g.title}</div>
        <span class="count-badge">${totalOccur}회 출제</span>
        <span class="chevron ${isOpen?'open':''}">▼</span>
      </div>
      <div class="group-body ${isOpen?'open':''}" id="${id}">
        ${g.items.map(item=>`
        <div class="q-item">
          <div>${item.q}</div>
          <div class="q-years">${item.years.map(y=>`<span class="year-pill">${y}회</span>`).join('')}</div>
        </div>`).join('')}
        <div class="tip">${g.tip}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleGroup(title, id){
  const body = document.getElementById(id);
  const head = body.previousElementSibling;
  const chev = head.querySelector('.chevron');
  if(openGroups.has(title)){
    openGroups.delete(title);
    body.classList.remove('open');
    chev.classList.remove('open');
  } else {
    openGroups.add(title);
    body.classList.add('open');
    chev.classList.add('open');
  }
}

const filterRow = document.getElementById('filter-row');
const allBtn = document.createElement('button');
allBtn.className='fb on'; allBtn.textContent='전체'; allBtn.dataset.cat='all';
allBtn.onclick=()=>{
  activeCats = new Set(cats);
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  allBtn.classList.add('on');
  render();
};
filterRow.appendChild(allBtn);
cats.forEach(cat=>{
  const btn = document.createElement('button');
  btn.className='fb'; btn.textContent=cat; btn.dataset.cat=cat;
  btn.onclick=()=>{
    const allOn = activeCats.size===cats.length;
    if(allOn){
      activeCats = new Set([cat]);
      document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
    } else if(activeCats.has(cat)){
      activeCats.delete(cat);
    } else {
      activeCats.add(cat);
    }
    btn.classList.toggle('on', activeCats.has(cat));
    allBtn.classList.toggle('on', activeCats.size===cats.length);
    render();
  };
  filterRow.appendChild(btn);
});

const domCat = [...cats].sort((a,b)=>
  DATA.filter(g=>g.cat===b).reduce((s,g)=>s+g.items.reduce((t,i)=>t+i.years.length,0),0)-
  DATA.filter(g=>g.cat===a).reduce((s,g)=>s+g.items.reduce((t,i)=>t+i.years.length,0),0)
)[0];
document.getElementById('s-dom').textContent = domCat;

render();
</script>
